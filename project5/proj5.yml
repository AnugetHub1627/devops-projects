apiVersion: apps/v1
kind: Deployment
metadata: 
  name: proj5-dp
spec: 
  replicas: 3
  selector:
    matchLabels: 
      target: devops-project5
  template: 
    metadata:
      labels: 
        target: devops-project5
    spec:
      containers: 
      - name: proj5-cont
        image: anummdocker/namurepo09:latest
        ports:
        - containerPort: 8080
        resources:
          requests: 
            cpu: "250m"
            memory: "256Mi"
          limits: 
            cpu: "500m"
            memory: "512Mi"

---
#manifest for load balalncer
apiVersion: v1 
kind: Service
metadata:
  name: proj5-servicelb
spec:
  type: NodePort
  selector: 
    target: devops-project5
  ports:
  - protocol: TCP
    port: 80
    targetPort: 8080    
